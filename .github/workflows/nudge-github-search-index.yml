name: Nudge GitHub Search Index

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  nudge-index:
    runs-on: ubuntu-latest

    steps:
      - name: Nudge GitHub code search
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method GET /search/code \
            -f q='repo:PujaDas-TransEV/ShuttleDriverAppFE2 import' \
            -f per_page=1 \
            >/dev/null || true
